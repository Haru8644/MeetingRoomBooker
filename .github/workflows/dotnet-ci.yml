name: dotnet-ci

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore MeetingRoomBooker.slnx

      - name: Build
        run: dotnet build MeetingRoomBooker.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test MeetingRoomBooker.slnx --configuration Release --no-build --verbosity normal
