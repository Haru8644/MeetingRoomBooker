name: operations-web-ci

on:
  pull_request:
    branches:
      - master
    paths:
      - 'MeetingRoomBooker.OperationsWeb/**'
      - '.github/workflows/operations-web-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'MeetingRoomBooker.OperationsWeb/**'
      - '.github/workflows/operations-web-ci.yml'

jobs:
  build:
    name: Build Operations Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MeetingRoomBooker.OperationsWeb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: MeetingRoomBooker.OperationsWeb/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
